name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run type checks
        run: npm run typecheck

      - name: Build web frontend
        run: npm run vite-build

      - name: Build web frontend for GitHub Pages
        run: npm run vite-build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

  python:
    name: Python and OnGen tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.10.10"
          enable-cache: true
          python-version: "3.12"

      - name: Install locked dependencies
        run: uv sync --locked

      - name: Run Python tests
        run: uv run python -m unittest discover -s tests -v

  rust:
    name: Rust check
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Tauri backend
        run: cargo check --locked --manifest-path apps/desktop/src-tauri/Cargo.toml
